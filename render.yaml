services:
  # Backend API (Node + Express, TypeScript)
  - type: web
    name: dart-api
    runtime: node
    rootDir: backend
    plan: free
    buildCommand: npm install && npm run build
    startCommand: npm run start
    envVars:
      - key: NODE_ENV
        value: production
      - key: NODE_VERSION
        value: 18.20.4
      # Set the rest (DATABASE_URL, JWT_SECRET, etc.) in the Render dashboard.

  # Frontend SPA (Create React App). The `routes` rewrite is what fixes
  # the "Not Found" on refresh — every unknown path is served index.html
  # so React Router can take over on the client.
  - type: web
    name: dart-frontend
    runtime: static
    rootDir: frontend
    plan: free
    buildCommand: npm install && npm run build
    staticPublishPath: ./build
    pullRequestPreviewsEnabled: false
    envVars:
      - key: NODE_VERSION
        value: 18.20.4
      - key: REACT_APP_API_BASE_URL
        sync: false   # set the deployed API URL in the dashboard
    headers:
      - path: /static/*
        name: Cache-Control
        value: public, max-age=31536000, immutable
      - path: /*
        name: X-Frame-Options
        value: DENY
      - path: /*
        name: X-Content-Type-Options
        value: nosniff
    routes:
      - type: rewrite
        source: /*
        destination: /index.html
